<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
{% seo title=false %}
<title>{{ page.title }} | {{ site.data.i18n[page.lang].site_title | default: site.title }}</title>
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicon.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="256x256" href="{{ '/assets/img/favicon-256.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/img/favicon-256.png' | relative_url }}">
<script>
  (function () {
    try {
      var stored = localStorage.getItem("sostonks-theme");
      if (stored === "light" || stored === "dark") {
        document.documentElement.setAttribute("data-theme", stored);
      }
    } catch (e) {}
  })();
</script>
